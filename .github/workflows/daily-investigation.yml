name: Daily Investigation

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  investigate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Data Directory
        run: mkdir -p data

      - name: Generate Investigation Case
        run: python scripts/generate_case.py
      - name: Update README
        run: python scripts/update_readme.py
      - name: Archive Investigation
        run: python scripts/archive_case.py

      - name: Commit Updated Case
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git add data/current_case.json
          git add cases/

          git diff --staged --quiet || git commit -m "Daily investigation update"

          git push
