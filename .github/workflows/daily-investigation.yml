name: Daily Investigation

on:
  schedule:
    # Runs at approximately 9:00 AM and 9:00 PM EST.
    # GitHub Actions cron schedules use UTC.
    - cron: "0 2,14 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-investigation
  cancel-in-progress: false

jobs:
  investigation:
    name: Generate Daily Investigation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      ###############################################################
      # Repository Setup
      ###############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Display Python Version
        run: python --version

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      ###############################################################
      # Phase I — Investigation Generation
      ###############################################################

      - name: Generate Investigation
        run: python scripts/generate_case.py

      - name: Update Active Operation
        run: python scripts/update_operation.py

      - name: Advance Investigation Lifecycle
        run: python scripts/update_case_progress.py

      - name: Generate Digital Evidence Repository
        run: python scripts/generate_evidence_repository.py

      - name: Correlate Evidence and Indicators
        run: python scripts/correlate_evidence.py

      - name: Archive Investigation
        run: python scripts/archive_case.py

      - name: Update Investigation History
        run: python scripts/update_history.py

      ###############################################################
      # Campaign Metrics
      #
      # This must run after update_history.py because the current
      # investigation must be present in the CSV before totals are
      # recalculated.
      ###############################################################

      - name: Recalculate Campaign Metrics
        run: python scripts/recalculate_campaign_metrics.py

      ###############################################################
      # Phase II — Evidence Collection
      ###############################################################

      - name: Update Evidence Database
        run: python scripts/update_evidence.py

      - name: Update Investigation Timeline
        run: python scripts/update_timeline.py

      - name: Update Investigation Workbook
        run: python scripts/update_workbook.py

      ###############################################################
      # Phase III — Intelligence Production
      ###############################################################

      - name: Generate Investigation Findings
        run: python scripts/update_findings.py

      - name: Generate Operational Assessment
        run: python scripts/update_assessment.py

      - name: Generate Campaign Summary
        run: python scripts/update_campaign_summary.py

      - name: Generate Threat Actor Profile
        run: python scripts/update_actor_profile.py

      - name: Update Threat Actor Database
        run: python scripts/update_actor_database.py

      - name: Update IOC Database
        run: python scripts/update_ioc_database.py

      ###############################################################
      # Phase IV — Forensic Reconstruction
      ###############################################################

      - name: Generate Device Profile
        run: python scripts/update_device_profile.py

      - name: Generate Forensic Summary
        run: python scripts/update_forensic_summary.py

      ###############################################################
      # Phase V — Reports and Dashboard
      #
      # The combined report runs after all source intelligence,
      # evidence, and forensic files have been regenerated.
      ###############################################################

      - name: Generate Biothreat Report
        run: python scripts/generate_biothreat_report.py

      - name: Generate Investigation Dashboard
        run: python scripts/generate_case_dashboard.py

      - name: Update README
        run: python scripts/update_readme.py

      ###############################################################
      # Validation
      ###############################################################

      - name: Validate Generated JSON
        run: |
          python -m json.tool data/current_case.json > /dev/null
          python -m json.tool operations/active_operation.json > /dev/null
          python -m json.tool operations/operation_status.json > /dev/null
          python -m json.tool intelligence/actor_database.json > /dev/null

      - name: Validate Digital Evidence Repository
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          case_path = Path("data/current_case.json")

          with case_path.open("r", encoding="utf-8") as file:
              case = json.load(file)

          case_id = case.get("case_id")

          if not case_id:
              raise SystemExit(
                  "Evidence validation failed: current case has no case_id."
              )

          evidence_directory = Path("evidence") / case_id
          manifest_path = evidence_directory / "evidence_manifest.json"
          custody_path = evidence_directory / "chain_of_custody.csv"
          summary_path = evidence_directory / "acquisition_summary.md"
          artifacts_directory = evidence_directory / "artifacts"

          required_artifacts = [
              artifacts_directory / "firewall_log.json",
              artifacts_directory / "access_control_log.json",
              artifacts_directory / "device_configuration.json",
              artifacts_directory / "analyst_notes.md",
          ]

          required_paths = [
              manifest_path,
              custody_path,
              summary_path,
              artifacts_directory,
              *required_artifacts,
          ]

          missing_paths = [
              str(path)
              for path in required_paths
              if not path.exists()
          ]

          if missing_paths:
              missing_text = "\n".join(
                  f"- {path}" for path in missing_paths
              )
              raise SystemExit(
                  "Evidence validation failed. Missing files:\n"
                  f"{missing_text}"
              )

          with manifest_path.open("r", encoding="utf-8") as file:
              manifest = json.load(file)

          expected_count = int(case.get("evidence_count", 0))
          evidence_items = manifest.get("evidence_items", [])
          actual_count = len(evidence_items)

          if manifest.get("case_id") != case_id:
              raise SystemExit(
                  "Evidence validation failed: manifest case ID "
                  "does not match the current case."
              )

          if expected_count != actual_count:
              raise SystemExit(
                  "Evidence validation failed: "
                  f"current_case.json contains {expected_count} evidence "
                  f"items, but the manifest contains {actual_count}."
              )

          manifest_count = int(
              manifest.get("evidence_count", actual_count)
          )

          if manifest_count != actual_count:
              raise SystemExit(
                  "Evidence validation failed: the manifest evidence_count "
                  "does not match the number of evidence records."
              )

          evidence_ids = [
              item.get("evidence_id")
              for item in evidence_items
          ]

          if any(not evidence_id for evidence_id in evidence_ids):
              raise SystemExit(
                  "Evidence validation failed: at least one evidence "
                  "record has no evidence_id."
              )

          if len(evidence_ids) != len(set(evidence_ids)):
              raise SystemExit(
                  "Evidence validation failed: duplicate evidence IDs "
                  "were found."
              )

          print(
              f"Evidence validation passed for {case_id}: "
              f"{actual_count} records."
          )
          PY

      - name: Display Investigation Summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          case_path = Path("data/current_case.json")
          operation_path = Path("operations/active_operation.json")

          with case_path.open("r", encoding="utf-8") as file:
              case = json.load(file)

          with operation_path.open("r", encoding="utf-8") as file:
              operation = json.load(file)

          case_id = case.get("case_id", "Unknown")
          evidence_count = case.get("evidence_count", 0)
          evidence_path = Path("evidence") / case_id

          print("Investigation generated successfully")
          print(f"Case ID: {case_id}")
          print(f"Severity: {case.get('severity', 'Unknown')}")
          print(f"Evidence items: {evidence_count}")
          print(f"Indicators: {case.get('ioc_count', 0)}")
          print(f"Evidence repository: {evidence_path}")
          print(f"Campaign cases: {operation.get('active_cases', 0)}")
          print(
              "Campaign evidence: "
              f"{operation.get('evidence_collected', 0)}"
          )
          print(
              "Campaign indicators: "
              f"{operation.get('ioc_count', 0)}"
          )
          PY

      ###############################################################
      # Commit Generated Changes
      ###############################################################

      - name: Commit Investigation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Daily investigation update"
            git push
          fi
