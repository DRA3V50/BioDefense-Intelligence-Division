name: Daily Investigation

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  investigate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Create Data Directory
        run: mkdir -p data

      - name: Generate Investigation Case
        run: python scripts/generate_case.py

      - name: Update Investigation Progress
        run: python scripts/update_case_progress.py

      - name: Update README
        run: python scripts/update_readme.py

      - name: Archive Investigation
        run: python scripts/archive_case.py

      - name: Update Investigation History
        run: python scripts/update_history.py

      - name: Update Evidence Log
        run: python scripts/update_evidence.py

      - name: Update Exposure Timeline
        run: python scripts/update_timeline.py

      - name: Update Weekly Assessment
        run: python scripts/update_assessment.py

      - name: Update Findings
        run: python scripts/update_findings.py

      - name: Update Campaign Summary
        run: python scripts/update_campaign_summary.py

      - name: Update IOC Database
        run: python scripts/update_ioc_database.py

      - name: Update MITRE Mapping
        run: python scripts/update_mitre_mapping.py

      - name: Update Campaign Summary
        run: python scripts/update_campaign_summary.py

      - name: Update Forensic Summary
        run: python scripts/update_forensic_summary.py

      - name: Update Device Profile
        run: python scripts/update_device_profile.py

      - name: Update Workbook
        run: python scripts/update_workbook.py

      - name: Commit Updated Case
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git add data/
          git add cases/
          git add evidence/
          git add reconstruction/
          git add intelligence/
          git add workbooks/

          git diff --staged --quiet || git commit -m "Daily investigation update"

          git push
